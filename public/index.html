<!DOCTYPE html>
<html>
<head>
  <title>Online Users</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .card {
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    #count {
      font-size: 70px;
      font-weight: bold;
      color: #0077ff;
    }

    p {
      color: #666;
      margin-top: 10px;
    }
  </style>

</head>
<body>

<div class="card">
  <h1>👥 People Online</h1>
  <div id="count">0</div>
  <p>Live visitors currently on this website</p>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
  const socket = io()

  socket.on("usersOnline", (number) => {
    document.getElementById("count").innerText = number
  })
</script>

</body>
</html>
